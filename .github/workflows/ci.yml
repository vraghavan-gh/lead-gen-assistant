name: Lead Gen Assistant CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # Dummy values so .env loads without error in tests
      DATABRICKS_HOST: https://dummy.cloud.databricks.com
      DATABRICKS_TOKEN: dummy_token
      DATABRICKS_HTTP_PATH: /sql/1.0/warehouses/dummy
      LLM_PROVIDER: anthropic
      LLM_API_KEY: dummy_key
      ANTHROPIC_API_KEY: dummy_key

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies only
      run: |
        python -m pip install --upgrade pip
        pip install pydantic>=2.5.0 pyyaml>=6.0.1 python-dotenv>=1.0.0 pytest pytest-cov

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Lint check
      run: |
        pip install flake8
        flake8 agents/ utils/ web/ --max-line-length=100 --ignore=E501,W503,E402
